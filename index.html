<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti 💜</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Georgia, serif;
overflow:hidden;

background-image: url("./fondo.jpg");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
}
/* capa oscura sin bloquear clics */
body::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.35);
pointer-events:none;
z-index:0;
}
/* sobre */

.sobre{
position:relative;
width:260px;
height:170px;
background:#b030b0;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
color:white;
cursor:pointer;
box-shadow:0 15px 40px rgba(0,0,0,.5);
transition:.4s;
z-index:10;
}
.sobre:hover{
transform:scale(1.05);
}

/* carta */

.carta{
position:absolute;
width:320px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 20px 50px rgba(0,0,0,.5);
opacity:0;
transform:translateY(40px);
transition:1s;
text-align:center;
z-index:2;
}

.titulo{
font-size:26px;
color:#b030b0;
margin-bottom:10px;
}

.texto{
font-size:16px;
line-height:1.6;
min-height:200px;
}

/* foto */

.final{
position:absolute;
text-align:center;
opacity:0;
transform:scale(.7);
transition:1s;
z-index:2;
}

.final img{
width:250px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,.6);
}

.mensajeFinal{
margin-top:20px;
font-size:22px;
color:white;
text-shadow:0 0 10px rgba(0,0,0,.8);
}

/* anillo */

.ringScene{
position:absolute;
text-align:center;
opacity:0;
transform:scale(.5);
transition:1.5s;
z-index:2;
}

.ring{
width:120px;
height:120px;
border:12px solid gold;
border-radius:50%;
margin:auto;
box-shadow:
0 0 20px gold,
0 0 40px gold,
0 0 60px gold;
animation:girar 4s linear infinite;
}

@keyframes girar{
from{transform:rotateY(0deg);}
to{transform:rotateY(360deg);}
}

.ringText{
margin-top:20px;
font-size:26px;
color:white;
text-shadow:0 0 15px rgba(0,0,0,.8);
}

/* corazones */

.corazon{
position:absolute;
font-size:22px;
animation:flotar 7s linear infinite;
z-index:1;
}

@keyframes flotar{
0%{transform:translateY(110vh); opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh); opacity:0;}
}

</style>
</head>

<body>

<div class="sobre" onclick="abrir()">💌</div>

<div class="carta" id="carta">

<div class="titulo">Para Ti 💜</div>

<div class="texto" id="texto"></div>

</div>

<div class="final" id="final">

<img src="foto.jpg">

<div class="mensajeFinal">
Contigo todo se siente más bonito 💜
</div>

</div>

<div class="ringScene" id="ringScene">

<div class="ring"></div>

<div class="ringText">
Juntos y tuyo por la eternidad 💜
</div>

</div>

<audio id="musica" loop>
<source src="cancion.mp3" type="audio/mpeg">
</audio>

<div class="corazon" style="left:10%">💜</div>
<div class="corazon" style="left:30%">💖</div>
<div class="corazon" style="left:50%">💗</div>
<div class="corazon" style="left:70%">💜</div>
<div class="corazon" style="left:90%">💖</div>

<script>

let mensaje = `
Hay personas que llegan a la vida sin avisar
y poco a poco se vuelven alguien muy especial.

Tú eres una de ellas.

Tu sonrisa,
tu forma de ser
y la manera en que haces que los momentos
se sientan más bonitos…

tienen algo único.

Y por eso hoy solo quería decirte algo simple:

Me alegra mucho que existas.
Me alegra saber que estas en mi vida y me alegra que seas todo para mi. Algo que es tan único y especial solo por ti, por nuestro amor que será eterno y arderá por siempre.
`;

let i=0;

function abrir(){

document.getElementById("musica").play();

document.querySelector(".sobre").style.display="none";

let carta=document.getElementById("carta");

carta.style.opacity="1";
carta.style.transform="translateY(0)";

setTimeout(escribir,500);

}

function escribir(){

if(i<mensaje.length){

document.getElementById("texto").innerHTML+=mensaje.charAt(i);

i++;

setTimeout(escribir,35);

}else{

setTimeout(mostrarFinal,2000);

}

}

function mostrarFinal(){

document.getElementById("carta").style.opacity="0";

setTimeout(()=>{

let final=document.getElementById("final");

final.style.opacity="1";
final.style.transform="scale(1)";

setTimeout(()=>{

final.style.opacity="0";

setTimeout(()=>{

let ring=document.getElementById("ringScene");

ring.style.opacity="1";
ring.style.transform="scale(1)";

},1000)

},6000)

},1000)

}

</script>

</body>
</html>
